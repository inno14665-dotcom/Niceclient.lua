<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Топ игроков • Supreme Duelist</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
            position: relative;
            background: #0a0f1a;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            overflow-x: hidden;
        }

        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(125deg, #0c1122 0%, #1a1f32 50%, #0f1a2b 100%);
            background-size: 400% 400%;
            animation: softDrift 22s ease-in-out infinite alternate;
        }

        .bg-orbs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.6;
            filter: blur(70px);
            animation: orbFloat 30s ease infinite alternate;
            background: 
                radial-gradient(circle at 20% 30%, rgba(70, 130, 200, 0.3) 0%, transparent 30%),
                radial-gradient(circle at 90% 70%, rgba(180, 130, 220, 0.25) 0%, transparent 35%),
                radial-gradient(circle at 40% 80%, rgba(100, 180, 210, 0.2) 0%, transparent 40%),
                radial-gradient(circle at 70% 15%, rgba(220, 160, 240, 0.2) 0%, transparent 35%);
        }

        @keyframes softDrift {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 20% 100%; }
        }

        @keyframes orbFloat {
            0% { transform: scale(1) translate(0%, 0%); opacity: 0.5; }
            33% { transform: scale(1.2) translate(-3%, 2%); opacity: 0.65; }
            66% { transform: scale(0.95) translate(4%, -4%); opacity: 0.55; }
            100% { transform: scale(1.1) translate(-2%, 3%); opacity: 0.7; }
        }

        .game-title {
            text-align: center;
            margin-bottom: 2.5rem;
            position: relative;
            z-index: 10;
            text-transform: uppercase;
            letter-spacing: 8px;
            font-weight: 300;
            color: #eceeff;
            text-shadow: 0 0 15px #5f7aff, 2px 4px 10px #0c0e1a;
            animation: titleGlow 4s infinite alternate;
        }

        .game-title h1 {
            font-size: clamp(2rem, 9vw, 4.5rem);
            font-weight: 600;
            line-height: 1.1;
            background: linear-gradient(135deg, #ffffff, #b0c2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 4px 6px #00000055);
        }

        .game-title p {
            font-size: clamp(1rem, 4vw, 1.6rem);
            letter-spacing: 6px;
            word-spacing: 8px;
            margin-top: 0.3rem;
            color: #ccd9ff;
            text-shadow: 0 0 12px #6688ff;
        }

        @keyframes titleGlow {
            0% { text-shadow: 0 0 10px #3f5eff, 0 0 20px #2a3faa; }
            100% { text-shadow: 0 0 20px #8ba4ff, 0 0 40px #3f5eff; }
        }

        .top-players {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-end;
            gap: 1.8rem 1.2rem;
            max-width: 1500px;
            margin: 0 auto;
            position: relative;
            z-index: 15;
            padding: 0.5rem;
        }

        .player-card {
            flex: 0 0 auto;
            width: 720px;
            max-width: 90vw;
            overflow: hidden;
            box-shadow: 0 20px 35px -5px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 215, 0, 0.3) inset;
            transition: transform 0.25s ease, box-shadow 0.3s ease;
            background: #0b1423;
            line-height: 0;
            border: none;
            border-radius: 0;
        }

        .player-card:hover {
            transform: translateY(-7px) scale(1.01);
            box-shadow: 0 28px 45px -5px #000000dd, 0 0 0 2px #ffdb7c inset;
        }

        .player-card img {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 720 / 191;
            object-fit: cover;
            background-color: #101827;
            border: none;
            outline: none;
            user-select: none;
            pointer-events: none;
            border-radius: 0;
        }

        .player-card[data-rank="1"] {
            box-shadow: 0 22px 45px -8px #fbbf24, 0 0 0 2px #fbbf24 inset;
        }
        .player-card[data-rank="2"] {
            box-shadow: 0 22px 45px -8px #b0b0b0, 0 0 0 2px #d0d0d0 inset;
        }
        .player-card[data-rank="3"] {
            box-shadow: 0 22px 45px -8px #cd7f32, 0 0 0 2px #cd7f32 inset;
        }

        @media (max-width: 1600px) {
            .player-card {
                width: 640px;
            }
        }
        @media (max-width: 1400px) {
            .player-card {
                width: 580px;
            }
        }
        @media (max-width: 1200px) {
            .player-card {
                width: 720px;
            }
            .top-players {
                flex-direction: column;
                align-items: center;
            }
        }

        .footer-air {
            height: 20px;
            opacity: 0;
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    <div class="bg-orbs"></div>

    <div class="game-title">
        <h1>TOP-PLAYERS</h1>
        <p>SUPREME DUELIST STICKMANS</p>
    </div>

    <div class="top-players">
        <div class="player-card" data-rank="1">
            <img src="https://raw.githubusercontent.com/ТВОЙ_ПРОФИЛЬ/ТВОЙ_РЕПО/main/player1.png" 
                 alt=""
                 title=""
                 onerror="this.src='https://via.placeholder.com/720x191/141d32/141d32?text=+';">
        </div>
        <div class="player-card" data-rank="2">
            <img src="https://raw.githubusercontent.com/ТВОЙ_ПРОФИЛЬ/ТВОЙ_РЕПО/main/player2.png" 
                 alt=""
                 title=""
                 onerror="this.src='https://via.placeholder.com/720x191/141d32/141d32?text=+';">
        </div>
        <div class="player-card" data-rank="3">
            <img src="https://raw.githubusercontent.com/ТВОЙ_ПРОФИЛЬ/ТВОЙ_РЕПО/main/player3.png" 
                 alt=""
                 title=""
                 onerror="this.src='https://via.placeholder.com/720x191/141d32/141d32?text=+';">
        </div>
        <div class="player-card">
            <img src="https://raw.githubusercontent.com/ТВОЙ_ПРОФИЛЬ/ТВОЙ_РЕПО/main/player4.png" 
                 alt=""
                 title=""
                 onerror="this.src='https://via.placeholder.com/720x191/141d32/141d32?text=+';">
        </div>
        <div class="player-card">
            <img src="https://raw.githubusercontent.com/ТВОЙ_ПРОФИЛЬ/ТВОЙ_РЕПО/main/player5.png" 
                 alt=""
                 title=""
                 onerror="this.src='https://via.placeholder.com/720x191/141d32/141d32?text=+';">
        </div>
    </div>

    <div class="footer-air"></div>
</body>
</html>
